<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - User Management</title>
    <!-- Include Bootstrap, FontAwesome, and project CSS as the other files do -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="./admin.css">
</head>
<body style="background-color: #ffffff;">
    <main id="admin-dashboard">
        <div class="container-fluid py-5" style="max-width: 1300px; margin: 0 auto; padding-top: 40px;">
            <div class="user-management-header text-center" style="margin-bottom: 30px;">
                <h1 style="color: #2b3b4e; font-weight: 700; font-size: 42px; margin-bottom: 15px;">Admin Dashboard</h1>
                <p style="color: #4a5568; font-size: 18px;">User Management</p>
            </div>
            
            <div class="dashboard-container">
                <div class="table-toolbar">
                    <div class="toolbar-left">
                        <div class="search-box">
                            <i class="fas fa-search"></i>
                            <input type="text" placeholder="Search">
                        </div>
                        <button class="btn-outline"><i class="far fa-user"></i> Role <i class="fas fa-chevron-down" style="font-size: 10px; margin-left: 5px;"></i></button>
                        <button class="btn-outline"><i class="fas fa-award"></i> Status <i class="fas fa-chevron-down" style="font-size: 10px; margin-left: 5px;"></i></button>
                        <button class="btn-outline"><i class="far fa-calendar-alt"></i> Date <i class="fas fa-chevron-down" style="font-size: 10px; margin-left: 5px;"></i></button>
                    </div>
                    <div class="toolbar-right">
                        <button class="btn-outline"><i class="fas fa-upload"></i> Export</button>
                        <button class="btn-primary-dark"><i class="fas fa-plus"></i> Add User</button>
                    </div>
                </div>
                
                <div class="table-responsive">
                    <table class="table admin-table">
                        <thead>
                            <tr>
                                <th><input type="checkbox"></th>
                                <th>Full Name <i class="fas fa-sort"></i></th>
                                <th>Email <i class="fas fa-sort"></i></th>
                                <th>Username <i class="fas fa-sort"></i></th>
                                <th>Status <i class="fas fa-sort"></i></th>
                                <th>Role <i class="fas fa-sort"></i></th>
                                <th>Joined Date <i class="fas fa-sort"></i></th>
                                <th>Last Active <i class="fas fa-sort"></i></th>
                                <th>Actions <i class="fas fa-sort"></i></th>
                            </tr>
                        </thead>
                        <tbody id="dashboard-table-body">
                            <!-- Populated by admin.js -->
                        </tbody>
                    </table>
                </div>

                <div class="pagination-container">
                    <div class="pagination-info">
                        Rows per page 
                        <select class="rows-select">
                            <option>10</option>
                        </select> 
                        of 140 rows
                    </div>
                    <div class="pagination-controls">
                        <button><i class="fas fa-angle-double-left"></i></button>
                        <button><i class="fas fa-angle-left"></i></button>
                        <button class="active">1</button>
                        <button>2</button>
                        <button>3</button>
                        <span>...</span>
                        <button>10</button>
                        <button><i class="fas fa-angle-right"></i></button>
                        <button><i class="fas fa-angle-double-right"></i></button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Include jQuery and Bootstrap js like index.html does, plus admin script -->
    <script src="https://code.jquery.com/jquery-1.12.4.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/js/bootstrap.min.js"></script>
    <script src="./admin.js"></script>
</body>
</html>
