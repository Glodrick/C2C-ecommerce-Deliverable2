<!DOCTYPE html>
<html lang="en">
<head>
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/assets/owl.carousel.min.css" integrity="sha256-UhQQ4fxEeABh4JrcmAJ1+16id/1dnlOEVCFOxDef9Lw=" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/assets/owl.theme.default.min.css" integrity="sha256-kksNxjDRxd/5+jGurZUJd1sdR2v+ClrCl3svESBaJqw=" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/css/bootstrap.min.css" integrity="sha384-HSMxcRTRxnN+Bdg0JdbxYKrThecOKuH5zCYotlSAcp1+c8xmyTe9GYg1l9a69psu" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" /> 
    <link rel="stylesheet" href="./style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C2C Plat</title>
</head>

<body>

<header id="header">
    <!-- Top strip -->
    <div class="custom-top-strip font-rale font-size-12">
        <div>
            <span class="text-black-50 font-size-10">Welcome :)</span>
            <a href="#" class="font-size-10">Sign In/Sign Up</a>
        </div>
        <div>
            <a href="#">ON SALE</a>
            <a href="#appleBanner">BRANDS</a>
            <a href="#">FAQ</a>
            <a href="#">CONTACT</a>
            <a href="#" style="position: relative;">
                <span class="font-size-16"><i class="fas fa-shopping-cart"></i></span>
                <span class="num-items" style="position:absolute; top:-5px; right:-10px; border-radius: 50%; background-color:#E44C4C; color:white; width: 15px; height: 15px; display:flex; justify-content:center; align-items:center; font-size:10px;">0</span>
            </a>
        </div>
    </div>
    
    <!-- Main Navigation -->
    <nav class="custom-navbar">
        <div class="custom-navbar-container">
            <!-- Brand -->
            <a class="font-weight-bold color-primary" href="#" style="font-size: 32px; margin-right: 20px; text-decoration: none;">Brand</a>
            
            <!-- Search Form -->
            <form class="custom-search-form">
                <div class="custom-search-input-group">
                    <span class="custom-search-icon"><i class="fas fa-search"></i></span>
                    <input class="custom-search-input font-rale" type="search" placeholder="Search for anything" aria-label="Search">
                   
                </div>
                <button class="custom-search-btn color-primary-bg" type="submit">Search</button>
            </form>
        </div>
    </nav>
</header>

 <main id="main-site">
    <section id="banner-area" class="container-fluid mt-3">
        <div class="owl-carousel owl-theme">
            <div class="bannerItem">
                <img src="./assets/Banner/apple.jpg" alt="Apple Banner">
            </div>
            <div class="bannerItem">
                <img src="./assets/Banner/intelBanner.png" alt="Intel Banner">
            </div>
            <div class="bannerItem">
                <img src="./assets/Banner/samsung banner.png" alt="Samsung Banner">
            </div>
        </div>
    </section>
    <section id="categoryOverview">
        <div class="container py-5">
            <h4>The future in your hands</h4>
            <div class="custom-category-row">
                <div class="category-item">
                    <a href="#">
                        <div class="category-img-box">
                            <img src="./assets/COMPUTER_CATEGORY.jpg" alt="computer category">
                        </div>
                    </a>
                    <h6>Computers</h6>
                </div>
                <div class="category-item">
                    <a href="#">
                        <div class="category-img-box">
                            <img src="./assets/iPhone-17发-191812927.jpg" alt="phone category">
                        </div>
                    </a>
                    <h6>Phones</h6>
                </div>
                <div class="category-item">
                    <a href="#">
                        <div class="category-img-box">
                            <img src="./assets/peripheral.jpg" alt="peripheral category">
                        </div>
                    </a>
                    <h6>Peripherals</h6>
                </div>
                <div class="category-item">
                    <a href="#">
                        <div class="category-img-box">
                            <img src="./assets/Otterbox-Phone-Cases-1200x1114-3247074711.webp" alt="accessory category">
                        </div>
                    </a>
                    <h6>Accessories</h6>
                </div>
            </div>
        </div>
    </section>
    <section id="homeBanner2">
        <div class="saOverlay">
            <h1 class="saHeading">A World of Tech Awaits.</h1>
            <p class="saBody">Shop through our wide selection of the latest tech products</p>
            <a href="#" class="btn">Shop All</a>
        </div>
    </section>

    <section id="brandNewSection" style="margin-top: 50px;">
        <div class="container-fluid">
            <h2 class="carousel-heading" style="font-size: 28px; font-weight: 800; color: #111; text-align: left; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 2px;">Brand New</h2>
            <div class="products">
                <div class="allProducts" style="display: block;">
                    <div id="brandNewCarousel" class="owl-carousel owl-theme">
                        <!-- Items injected by app.js -->
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section id="saleSection" style="margin-top: 50px; margin-bottom: 50px;">
        <div class="container-fluid">
            <h2 class="carousel-heading" style="font-size: 28px; font-weight: 800; color: #111; text-align: left; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 2px;">Sale</h2>
            <div class="products">
                <div class="allProducts" style="display: block;">
                    <div id="saleCarousel" class="owl-carousel owl-theme">
                        <!-- Items injected by app.js -->
                    </div>
                </div>
            </div>
        </div>
    </section>

 </main>

 <footer>

 </footer>

 <!-- jQuery (necessary for Bootstrap's JavaScript plugins) -->
    <script src="https://code.jquery.com/jquery-1.12.4.min.js" integrity="sha384-nvAa0+6Qg9clwYCGGPpDQLVpLNn0fRaROjHqs13t4Ggj3Ez50XnGQqc/r8MhnRDZ" crossorigin="anonymous"></script>
    <!-- Include all compiled plugins (below), or include individual files as needed -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/js/bootstrap.min.js" integrity="sha384-aJ21OjlMXNL5UyIl/XNwTMqvzeRMZH2w8c5cRVpzpU8Y5bApTppSuUkhZXN0VxHd" crossorigin="anonymous"></script>
     <script src="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/owl.carousel.min.js" integrity="sha256-pTxD+DSzIwmwhOqTFN+DB+nHjO4iAsbgfyFq5K5bcE0=" crossorigin="anonymous"></script>
    <script src="./app.js"></script>
</body>
</html>
